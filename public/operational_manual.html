<head>

    <style>
        :root {
            --mck-blue: #002D72;
            --mck-light-blue: #0054A6;
            --mck-grey: #F2F2F2;
            --text-dark: #333333;
            --text-grey: #666666;

        }

            margin: 0;
            padding: 0;
        }

        body {

            line-height: 1.6;
            color: var(--text-dark);
            background-color: white;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        aside {
            width: 300px;
            background-color: var(--mck-blue);
            color: white;
            display: flex;
            flex-col: column;
            padding: 2rem 1.5rem;
            flex-shrink: 0;
            overflow-y: auto;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 2.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 1rem;
        }

        nav ul {
            list-style: none;
        }

        nav li {
            margin-bottom: 0.75rem;
        }

        nav a {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
            display: block;
            padding: 0.5rem 0.75rem;
            border-radius: 4px;
        }

        nav a:hover, nav a.active {
            color: white;
            background-color: rgba(255,255,255,0.1);
        }

        /* Main Content */
        main {
            flex-grow: 1;
            overflow-y: auto;
            background-color: white;
            position: relative;
        }

        header {
            position: sticky;
            top: 0;
            background: white;
            padding: 1.5rem 3rem;
            border-bottom: 1px solid var(--mck-grey);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .lang-switcher {
            display: flex;
            gap: 1rem;
        }

        .lang-btn {
            background: none;
            border: 1px solid #ccc;
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
            cursor: pointer;
            border-radius: 4px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .lang-btn.active {
            background: var(--mck-blue);
            color: white;
            border-color: var(--mck-blue);
        }

        .content-wrapper {
            max-width: 900px;
            margin: 0 auto;
            padding: 4rem 3rem;
        }

        section {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            color: var(--mck-blue);
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            font-weight: 700;
        }

        h2 {
            color: var(--mck-blue);
            font-size: 1.75rem;
            margin: 2.5rem 0 1.5rem 0;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--mck-blue);
        }

        h3 {
            font-size: 1.25rem;
            margin: 1.5rem 0 1rem 0;
            color: var(--mck-light-blue);
        }

        p {
            margin-bottom: 1.25rem;
            color: var(--text-dark);
        }

        ul, ol {
            margin-bottom: 1.5rem;
            padding-left: 1.5rem;
        }

        li {
            margin-bottom: 0.5rem;
        }

        .tip-box {
            background-color: #F0F7FF;
            border-left: 4px solid var(--mck-light-blue);
            padding: 1.5rem;
            margin: 2rem 0;
            border-radius: 0 4px 4px 0;
        }

        .tip-box h4 {
            color: var(--mck-blue);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .highlight {
            font-weight: 700;
            color: var(--mck-blue);
        }

        hr {
            border: none;
            border-top: 1px solid var(--mck-grey);
            margin: 3rem 0;
        }

        .status-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-left: 0.5rem;
        }

        .status-cleared { background: #E6F4EA; color: #1E8E3E; }
        .status-reactive { background: #FCE8E6; color: #D93025; }
        .status-pending { background: #FEF7E0; color: #F9AB00; }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            aside { width: 100%; height: auto; padding: 1rem; }
            .content-wrapper { padding: 2rem 1.5rem; }
        }
    </style>
</head>

    let currentLang = 'zh';
    let currentSection = 'intro';

    function setLanguage(lang) {
        currentLang = lang;
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.classList.toggle('active', btn.innerText.includes(lang === 'zh' ? '繁體' : lang === 'en' ? 'English' : 'Việt'));
        });
        updateContent();
    }

    function showSection(id) {
        currentSection = id;
        document.querySelectorAll('nav a').forEach(a => {
            a.classList.toggle('active', a.getAttribute('data-target') === id);
        });
        document.getElementById('breadcrumb').innerText = id.toUpperCase();
        updateContent();
    }

    function updateContent() {
        const data = contentData[currentLang] && contentData[currentLang][currentSection] 
                     ? contentData[currentLang][currentSection] 
                     : contentData['zh'][currentSection]; // Fallback to zh if missing
        
        const wrapper = document.getElementById('main-content');
        wrapper.innerHTML = `
            <section class="active">
                <h1>${data.title}</h1>
                <div class="manual-body">
                    ${data.body}
                </div>
            </section>
        `;
    }

    // Initialize
    updateContent();
